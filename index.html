  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

  <style>
    :root {
      --bg: #eef3f8;
      --ink: #182230;
      --muted: #667085;
      --line: #d7e0eb;
      --panel: #ffffff;
      --navy: #101828;
      --teal: #0f766e;
      --teal-dark: #0b5d57;
      --amber: #d97706;
      --red: #b42318;
      --green: #0f766e;
      --blue: #175cd3;
      --radius: 10px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      color: var(--ink);
      background:
        linear-gradient(135deg, rgba(15, 118, 110, .08), transparent 32%),
        linear-gradient(315deg, rgba(217, 119, 6, .08), transparent 30%),
        var(--bg);
    }
    button, input, textarea, select { font: inherit; }
    button { cursor: pointer; border: 0; }
    .hidden { display: none !important; }
    .login {
      position: fixed;
      inset: 0;
      z-index: 9999;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      background: #101828;
    }
    .login-card {
      width: min(430px, 100%);
      overflow: hidden;
      border-radius: 14px;
      background: white;
      box-shadow: 0 30px 80px rgba(0,0,0,.28);
      border: 1px solid rgba(255,255,255,.2);
    }
    .login-head {
      padding: 28px 24px;
      text-align: center;
      color: white;
      background: linear-gradient(135deg, #0f766e, #115e59 48%, #101828);
    }
    .brand-mark {
      width: 64px;
      height: 64px;
      margin: 0 auto 12px;
      display: grid;
      place-items: center;
      border-radius: 14px;
      background: #fff;
      color: var(--teal);
      font-size: 30px;
      box-shadow: 0 16px 32px rgba(0,0,0,.18);
    }
    .login-head h1 { margin: 0; font-size: 25px; letter-spacing: .02em; }
    .login-head p { margin: 6px 0 0; color: #d8fbf4; font-size: 14px; }
    .conn {
      display: none;
      margin-top: 12px;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
