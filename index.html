    button, input, select, textarea { font: inherit; }

    }
    .login-card {

      border-radius: 18px;
      background: white;
      border: 1px solid rgba(255,255,255,.2);
      box-shadow: 0 34px 90px rgba(0,0,0,.34);
    }
    .login-head {
      padding: 30px 24px 24px;
      text-align: center;
      color: white;
      background: linear-gradient(135deg, var(--teal), var(--navy));

      height: 66px;
      margin: 0 auto 14px;
      display: grid;
      place-items: center;

      background: #ffffff;
      color: var(--teal);
      font-size: 32px;
      font-weight: 1000;
      box-shadow: 0 18px 36px rgba(0,0,0,.22);
    }

    .login-head p { margin: 7px 0 0; color: #d8fff7; font-size: 14px; }
