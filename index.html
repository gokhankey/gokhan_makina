<html lang="tr">

    :root {
      --bg: #edf4f7;
      --panel: #ffffff;
      --ink: #172033;
      --muted: #667085;
      --line: #d8e3ec;
      --navy: #0f172a;
      --navy2: #1e293b;
      --teal: #0f766e;
      --teal2: #115e59;
      --blue: #175cd3;
      --green: #0f766e;
      --amber: #d97706;
      --red: #b42318;
      --radius: 12px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      color: var(--ink);
      background:
        linear-gradient(135deg, rgba(15,118,110,.1), transparent 34%),
        linear-gradient(315deg, rgba(217,119,6,.08), transparent 30%),
        var(--bg);
    }
    button, input, select, textarea { font: inherit; }
    button { border: 0; cursor: pointer; }
    a { color: inherit; text-decoration: none; }
    .hidden { display: none !important; }
    .login {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background:
        radial-gradient(circle at 18% 8%, rgba(20,184,166,.22), transparent 28%),
        linear-gradient(135deg, #0f172a, #111827 58%, #064e3b);
    }
    .login-card {
      width: min(430px, 100%);
      overflow: hidden;
      border-radius: 18px;
      background: #fff;
      box-shadow: 0 34px 90px rgba(0,0,0,.34);
    }
    .login-head {
      padding: 30px 24px 24px;
      color: white;
      text-align: center;
      background: linear-gradient(135deg, var(--teal), var(--navy));
    }
    .brand {
      width: 68px;
      height: 68px;
      margin: 0 auto 14px;
      display: grid;
      place-items: center;
      border-radius: 18px;
      color: var(--teal);
      background: white;
      font-size: 27px;
      font-weight: 1000;
      box-shadow: 0 18px 36px rgba(0,0,0,.2);
    }
    .login-head h1 { margin: 0; font-size: 26px; letter-spacing: .03em; }
    .login-head p { margin: 7px 0 0; color: #d8fff7; font-size: 14px; }
